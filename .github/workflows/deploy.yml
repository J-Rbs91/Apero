name: Deploy Vite app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VITE_GITHUB_OWNER: j-rbs91
      VITE_GITHUB_REPO: Apero
      VITE_GITHUB_BRANCH: main
      VITE_APERO_STORAGE_MODE: api-vps
      VITE_APP_BASE_URL: https://j-rbs91.github.io/Apero
      # URL publique de la mini API VPS, injectee au build via une variable de
      # depot GitHub (Settings > Secrets and variables > Actions > Variables).
      # Repli sur un secret du meme nom au cas ou la valeur aurait ete rangee
      # dans l'onglet Secrets plutot que Variables (confusion frequente).
      VITE_APERO_API_BASE_URL: ${{ vars.VITE_APERO_API_BASE_URL || secrets.VITE_APERO_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verifier la configuration de l'API apero
        run: |
          if [ -z "$VITE_APERO_API_BASE_URL" ]; then
            echo "::error title=VITE_APERO_API_BASE_URL absente::Ni la variable de depot ni le secret VITE_APERO_API_BASE_URL ne sont definis. Le site serait deploye avec le message 'comptoir numerique non raccorde' et ne pourrait pas sceller de convocation. Definir la variable dans Settings > Secrets and variables > Actions > onglet Variables (voir docs/RACCORDEMENT-VPS.md), puis relancer ce workflow."
            exit 1
          fi
          echo "API apero raccordee : le build embarque une URL d'API."

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload dist folder
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
