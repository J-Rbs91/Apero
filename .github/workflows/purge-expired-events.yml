name: Purge expired aperos

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Purge expired events
        run: npm run purge:expired

      - name: Commit purge changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/events data/rewards
          git diff --cached --quiet || git commit -m "Purge expired aperos and update rewards ledger"
          git push